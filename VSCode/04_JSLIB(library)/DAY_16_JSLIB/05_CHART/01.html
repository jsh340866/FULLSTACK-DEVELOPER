<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body style="display: flex;justify-content: center;align-items: center;height: 100vh;">

  <div style="width: 800px;height: 500px;">
    <canvas id="myChart"></canvas>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    const ctx = document.getElementById('myChart');

    const dataSet = [
      // 기본 단일 DataSet  
      // {
      //   label: '# of Votes',
      //   data: [12, 19, 3, 5, 2, 3],
      //   borderWidth: 1,
      //   backgroundColor: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange']
      // }

      // 여러 DataSet
      {
        label: 'red',
        data: [12, 0, 0, 0, 0, 0],
        borderWidth: 1,
        backgroundColor: 'red',
        borderColor: '',
      },
      {
        label: 'orange',
        data: [0, 24, 0, 0, 0, 0],
        borderWidth: 1,
        backgroundColor: 'orange',
        borderColor: '',
      },
      {
        label: 'Yellow',
        data: [0, 0, 37, 0, 0, 0],
        borderWidth: 1,
        backgroundColor: 'Yellow',
        borderColor: '',
      },
      {
        label: 'Green',
        data: [0, 0, 0, 32, 0, 0],
        borderWidth: 1,
        backgroundColor: 'Green',
        borderColor: '',
      },
      {
        label: 'Blue',
        data: [0, 0, 0, 0, 55, 0],
        borderWidth: 1,
        backgroundColor: 'blue',
        borderColor: '',
      },
      {
        label: 'navy',
        data: [0, 0, 0, 0, 0, 45],
        borderWidth: 1,
        backgroundColor: 'navy',
        borderColor: '',

        // barPercentage: 11,         // 개별 막대에 대한 너비 비율(%)
        // categoryPercentage: 1,     // 전체 너비 중 해당 막대 그룹이 차지하는 비율(%)
      },
    ]

    const options = {
      animation: {
        delay: (el) => { return el.dataIndex * 100; }
      },
      scales: {
        x: {
          stacked: true,

        },
        y: {
          beginAtZero: true
          // min : 0,
          // max : 100,
          // ticks : { // 단위 눈금자 표시
          //   stepSize : 10,
          // }
        },
      },
      onClick: (e,chartEl) => {
        // console.log(e)
        console.log(chartEl)
      }
    }


    new Chart(ctx, {
      type: 'bar',     //bar,line,pie,doughnut,bubble,scatter,heatmap...
      data: {
        labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
        datasets: dataSet,
      },
      options: options,

    });
  </script>

</body>

</html>
